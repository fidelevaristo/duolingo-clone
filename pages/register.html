<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Obiettivo di Studio - Duolingo</title>
    <link rel="stylesheet" href="../css/pages/register.css" />
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="shortcut icon" href="../favicon.ico" type="image/x-icon" />
  </head>

  <body>
    <main class="onboarding">
      <header class="onboarding__header">
        <a
          href="../index.html"
          class="onboarding__logo-link"
          aria-label="Duolingo home"
        >
          <img
            src="../assets/global/logo/logo.svg"
            alt="Duolingo"
            class="onboarding__logo"
          />
        </a>

        <button class="onboarding__language-button" type="button">
          Lingua sito: Italiano
          <img
            class="onboarding__language-icon"
            src="../assets/global/icons/arrow_bottom.svg"
            alt=""
          />
        </button>
      </header>

      <section
        class="onboarding__screen onboarding__screen--active"
        data-screen="courses"
      >
        <h1 class="onboarding__title">Cosa vuoi imparare?</h1>

        <div class="course-selector">
          <button
            class="course-selector__card"
            type="button"
            data-course="languages"
          >
            <img
              src="../assets/pages/register/icons/languages-icon.svg"
              alt=""
              class="course-selector__icon"
            />
            <span class="course-selector__name">Lingue</span>
          </button>

          <button
            class="course-selector__card"
            type="button"
            data-course="chess"
          >
            <img
              src="../assets/pages/register/icons/chess-icon.svg"
              alt=""
              class="course-selector__icon"
            />
            <span class="course-selector__name">Scacchi</span>
          </button>

          <button
            class="course-selector__card"
            type="button"
            data-course="math"
          >
            <img
              src="../assets/pages/register/icons/math-icon.svg"
              alt=""
              class="course-selector__icon"
            />
            <span class="course-selector__name">Matematica</span>
          </button>
        </div>
      </section>

      <section class="onboarding__screen" data-screen="languages">
        <h1 class="onboarding__title">Voglio imparare...</h1>

        <div class="language-selector">
          <button
            class="language-selector__card"
            type="button"
            data-language="english"
          >
            <img
              src="../assets/pages/register/icons/english-icon.svg"
              alt=""
              class="language-selector__flag"
            />
            <strong class="language-selector__name">Inglese</strong>
            <span class="language-selector__students">4,62 Mln studenti</span>
          </button>

          <button
            class="language-selector__card"
            type="button"
            data-language="spanish"
          >
            <img
              src="../assets/pages/register/icons/spanish-icon.svg"
              alt=""
              class="language-selector__flag"
            />
            <strong class="language-selector__name">Spagnolo</strong>
            <span class="language-selector__students">1,68 Mln studenti</span>
          </button>

          <button
            class="language-selector__card"
            type="button"
            data-language="french"
          >
            <img
              src="../assets/pages/register/icons/franch-icon.svg"
              alt=""
              class="language-selector__flag"
            />
            <strong class="language-selector__name">Francese</strong>
            <span class="language-selector__students">1,16 Mln studenti</span>
          </button>

          <button
            class="language-selector__card"
            type="button"
            data-language="german"
          >
            <img
              src="../assets/pages/register/icons/german-icon.svg"
              alt=""
              class="language-selector__flag"
            />
            <strong class="language-selector__name">Tedesco</strong>
            <span class="language-selector__students">746.000 studenti</span>
          </button>

          <button
            class="language-selector__card"
            type="button"
            data-language="japanese"
          >
            <img
              src="../assets/pages/register/icons/japonese-icon.svg"
              alt=""
              class="language-selector__flag"
            />
            <strong class="language-selector__name">Giapponese</strong>
            <span class="language-selector__students">368.000 studenti</span>
          </button>

          <button
            class="language-selector__card"
            type="button"
            data-language="portuguese"
          >
            <img
              src="../assets/pages/register/icons/portuguese-icon.svg"
              alt=""
              class="language-selector__flag"
            />
            <strong class="language-selector__name">Portoghese</strong>
            <span class="language-selector__students">269.000 studenti</span>
          </button>

          <button
            class="language-selector__card"
            type="button"
            data-language="korean"
          >
            <img
              src="../assets/pages/register/icons/corean-icon.svg"
              alt=""
              class="language-selector__flag"
            />
            <strong class="language-selector__name">Coreano</strong>
            <span class="language-selector__students">231.000 studenti</span>
          </button>

          <button
            class="language-selector__card"
            type="button"
            data-language="chinese"
          >
            <img
              src="../assets/pages/register/icons/chinese-icon.svg"
              alt=""
              class="language-selector__flag"
            />
            <strong class="language-selector__name">Cinese</strong>
            <span class="language-selector__students">196.000 studenti</span>
          </button>
        </div>
      </section>

      <section
        class="onboarding__screen"
        data-screen="loading"
        aria-live="polite"
      >
        <h1 class="onboarding__title">Voglio imparare...</h1>

        <div class="loading-dots" aria-label="Caricamento">
          <span class="loading-dots__dot"></span>
          <span class="loading-dots__dot"></span>
          <span class="loading-dots__dot"></span>
        </div>
      </section>
    </main>

    <script
      type="module"
      src="../js/features/register-render.js"
      defer
    ></script>
  </body>
</html>
