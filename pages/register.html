<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Obiettivo di Studio - Duolingo</title>
    <link rel="stylesheet" href="../css/pages/register.css" />
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="shortcut icon" href="../favicon.ico" type="image/x-icon" />
  </head>

  <body>
    <main class="onboarding">
      <header class="onboarding__header">
        <a
          href="../index.html"
          class="onboarding__logo-link"
          aria-label="Duolingo home"
        >
          <img
            src="../assets/global/logo/logo.svg"
            alt="Duolingo"
            class="onboarding__logo"
          />

        <button class="onboarding__language-button" type="button">
          Lingua sito: Italiano
          <img
            class="onboarding__language-icon"
            src="../assets/global/icons/arrow_bottom.svg"
            alt=""
          />
        </button>
      </header>
    </main>

    <script
      type="module"
      src="../js/features/register-render.js"
      defer
    ></script>
