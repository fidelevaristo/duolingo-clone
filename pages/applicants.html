<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Duolingo English Test</title>
    <link rel="stylesheet" href="../css/pages/applicants.css" />
    <link rel="stylesheet" href="../css/main.css" />
    <link
      rel="shortcut icon"
      href="../assets/english-test/icons/favicon-juicy.ico"
      type="image/x-icon"
    />
  </head>
  <body>
    <!-- Inizio Header -->
    <header class="header">
      <!-- Inizio Logo -->
      <div class="header__logo">
        <img
          src="../assets/english-test/icons/duolingo-english-test.svg"
          alt="Duolingo English Test"
        />
      </div>
      <!-- Fine Logo -->

      <!-- Inizio Nav Menu -->
      <div class="header__nav-menu">
        <!-- Inizio Navigazione -->
        <nav class="header__nav-menu-items">
          <ul>
            <!-- Inizio Item Candidati -->
            <li class="header__nav-menu-item">
              <span>Candidati</span>
              <img
                src="../assets/english-test/icons/arrow-bottom.svg"
                alt="Open Candidati menu"
              />
            </li>
            <!-- Fine Item Candidati -->

            <!-- Inizio Item Istituti -->
            <li class="header__nav-menu-item">
              <span>Istituti</span>
              <img
                src="../assets/english-test/icons/arrow-bottom.svg"
                alt="Open Istituti menu"
              />
            </li>
            <!-- Fine Item Istituti -->

            <!-- Inizio Item Ricercatori -->
            <li class="header__nav-menu-item">
              <span>Ricercatori</span>
              <img
                src="../assets/english-test/icons/arrow-bottom.svg"
                alt="Open Ricercatori menu"
              />
            </li>
            <!-- Fine Item Ricercatori -->
          </ul>
        </nav>
        <!-- Fine Navigazione -->

        <!-- Inizio Bottoni -->
        <div class="header__nav-menu-buttons">
          <a href="#" class="header__nav-menu-buttons-accedi">Accedi</a>
          <a href="#" class="header__nav-menu-buttons-registrati">Registrati</a>
        </div>
        <!-- Fine Bottoni -->
      </div>
      <!-- Fine Nav Menu -->
    </header>
    <!-- Fine Header -->

    <!-- Main -->
    <main>
      <!-- Hero Section -->
      <section class="hero">
        <!-- Hero Content -->
        <div class="hero__content">
          <h1 class="hero__title">
            Certifica il tuo inglese, dove e quando vuoi
          </h1>

          <!-- Benefits List -->
          <ul class="hero__benefits">
            <li class="hero__benefit">
              <img
                src="../assets/english-test/icons/checked-green-icon.svg"
                alt=""
                aria-hidden="true"
              />
              <span
                >Completa l'esame online, senza bisogno di prenotazione</span
              >
            </li>

            <li class="hero__benefit">
              <img
                src="../assets/english-test/icons/checked-green-icon.svg"
                alt=""
                aria-hidden="true"
              />
              <span>Ricevi i risultati in 2 giorni</span>
            </li>

            <li class="hero__benefit">
              <img
                src="../assets/english-test/icons/checked-green-icon.svg"
                alt=""
                aria-hidden="true"
              />
              <span>Un esame molto più economico degli altri</span>
            </li>
          </ul>

          <a href="#" class="hero__cta">Prova Gratis</a>
        </div>

        <!-- Hero Image -->
        <div class="hero__image">
          <img
            src="../assets/english-test/cards/certifica-inglese.svg"
            alt="Student taking the Duolingo English Test"
          />
        </div>
      </section>

      <!-- Partners Section -->
      <section class="partners" aria-label="Partner universities">
        <ul class="partners__list">
          <li class="partners__item">
            <img
              src="../assets/english-test/partners/university-toronto.svg"
              alt="University of Toronto"
            />
          </li>

          <li class="partners__item">
            <img
              src="../assets/english-test/partners/yale.svg"
              alt="Yale University"
            />
          </li>

          <li class="partners__item">
            <img
              src="../assets/english-test/partners/imperial-college-london.svg"
              alt="Imperial College London"
            />
          </li>

          <li class="partners__item">
            <img
              src="../assets/english-test/partners/nyu.svg"
              alt="New York University"
            />
          </li>

          <li class="partners__item">
            <img
              src="../assets/english-test/partners/university-california.svg"
              alt="University of California"
            />
          </li>

          <li class="partners__item">
            <img
              src="../assets/english-test/partners/london-school.svg"
              alt="London Business School"
            />
          </li>
        </ul>
      </section>
    </main>

    <!-- Inizio Footer-->
    <footer class="footer"></footer>
    <!-- Fine Footer-->
  </body>
</html>
