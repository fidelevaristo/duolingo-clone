<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duolingo - Impara il portoghese con lezioni efficaci</title>
    <link rel="stylesheet" href="../css/pages/welcome.css">
</head>

<body>
    <main class="survey-page">
        <header class="survey-header">
            <button class="survey-header__back" type="button" aria-label="Torna Indietro">
                <img src="../assets/pages/welcome/icons/arrow-left-icon.svg" alt="">
            </button>

            <div class="survey-progress">
                <div class="survey-progress__bar"></div>
            </div>
        </header>
        <section class="survey-content">
            <div class="survey-question">
                <img class="survey-question__mascot" src="./assets/images/duo-question.png" alt="Mascot Duolingo" />

                <h1 class="survey-question__bubble">
                    Come ci hai conosciuto?
                </h1>
            </div>

            <div class="survey-options" role="group" aria-label="Come ci hai conosciuto?">
                <button class="survey-option" type="button" data-value="youtube">
                    <img src="../assets/pages/welcome/icons/youtube-icon.svg" alt="" class="survey-option__icon" />
                    <span>YouTube</span>
                </button>

                <button class="survey-option" type="button" data-value="facebook-instagram">
                    <img src="../assets/pages/welcome/icons/facebook-instagram-icon.svg" alt=""
                        class="survey-option__icon" />
                    <span>Facebook/Instagram</span>
                </button>

                <button class="survey-option" type="button" data-value="news-blog">
                    <img src="../assets/pages/welcome/icons/notizie-articoli-blog-icon.svg" alt=""
                        class="survey-option__icon" />
                    <span>Notizie/articoli/blog</span>
                </button>

                <button class="survey-option" type="button" data-value="friends-family">
                    <img src="../assets/pages/welcome/icons/amici-famiglia-icon.svg" alt=""
                        class="survey-option__icon" />
                    <span>Amici e famiglia</span>
                </button>

                <button class="survey-option" type="button" data-value="tv">
                    <img src="../assets/pages/welcome/icons/tv-icon.svg" alt="" class="survey-option__icon" />
                    <span>TV</span>
                </button>

                <button class="survey-option" type="button" data-value="tiktok">
                    <img src="../assets/pages/welcome/icons/tiktok-icon.svg" alt="" class="survey-option__icon" />
                    <span>TikTok</span>
                </button>

                <button class="survey-option" type="button" data-value="google">
                    <img src="../assets/pages/welcome/icons/google-icon.svg" alt="" class="survey-option__icon" />
                    <span>Ricerca su Google</span>
                </button>
                <button class="survey-option" type="button" data-value="other">
                    <img src="../assets/pages/welcome/icons/altro-icon.svg" alt="" class="survey-option__icon" />
                    <span>Altro</span>
                </button>
            </div>
        </section>

        <footer class="survey-footer">
            <button class="survey-footer__continue" type="button" disabled>
                Continua
            </button>
        </footer>
    </main>


</body>

</html>
