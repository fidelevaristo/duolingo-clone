<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duolingo - Impara il portoghese con lezioni efficaci</title>
    <link rel="stylesheet" href="../css/pages/welcome.css">
</head>

<body>
    <main class="survey-page">
        <header class="survey-header">
            <button class="survey-header__back" type="button" aria-label="Torna Indietro" data-back>
                <img src="../assets/pages/welcome/icons/arrow-left-icon.svg" alt="">
            </button>

            <div class="survey-progress">
                <div class="survey-progress__bar" data-progress-bar></div>
            </div>
        </header>
        
        <section class="survey-content">
            <div class="survey-question">
                <img class="survey-question__mascot" src="./assets/images/duo-question.png" alt="Mascot Duolingo" />

                <h1 class="survey-question__bubble">
                    Come ci hai conosciuto?
                </h1>
            </div>

            <div class="survey-options" role="group" aria-label="Come ci hai conosciuto?" data-options>
                
            </div>
        </section>

        <footer class="survey-footer">
            <button class="survey-footer__continue" type="button" data-continue disabled>
                Continua
            </button>
        </footer>
    </main>


</body>

</html>
